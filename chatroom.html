<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Chatroom</title>
  <style>
    :root { --bg: #0f172a; --panel: #1e293b; --accent: #3b82f6; --text: #e2e8f0; --msg-me: #2563eb; --msg-other: #334155; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
    
    /* Setup Screen */
    #setup-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10; }
    .card { background: var(--panel); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; max-width: 400px; width: 90%; }
    input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 1rem; }
    button { background: var(--accent); cursor: pointer; font-weight: 600; border: none; }
    button:hover { opacity: 0.9; }
    .room-code { font-size: 1.5rem; letter-spacing: 4px; background: #0f172a; padding: 10px; border-radius: 8px; margin: 10px 0; user-select: all; }
    
    /* Chat UI */
    #chat-screen { display: none; flex-direction: column; height: 100%; }
    header { background: var(--panel); padding: 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
    #messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; word-wrap: break-word; position: relative; }
    .msg.me { align-self: flex-end; background: var(--msg-me); border-bottom-right-radius: 4px; }
    .msg.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }
    .msg img, .msg video { max-width: 100%; border-radius: 8px; margin-top: 5px; }
    .meta { font-size: 0.7rem; opacity: 0.7; margin-top: 4px; text-align: right; }
    
    #input-area { background: var(--panel); padding: 10px; display: flex; gap: 8px; align-items: center; border-top: 1px solid #334155; }
    #file-input { display: none; }
    .icon-btn { background: #334155; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; color: white; }
    #msg-input { flex: 1; }
    
    .hidden { display: none !important; }
    #share-link { font-size: 0.85rem; color: #94a3b8; word-break: break-all; margin-top: 5px; }
  </style>
</head>
<body>

  <!-- Setup / Join Screen -->
  <div id="setup-screen">
    <div class="card">
      <h2>🌐 Real-Time Chatroom</h2>
      <p style="margin: 10px 0; color: #94a3b8;">Create a room or join with a code</p>
      <input type="text" id="join-code" placeholder="Enter room code (e.g., X7K9P2)">
      <button onclick="joinRoom()">Join Room</button>
      <hr style="margin: 15px 0; border-color: #334155;">
      <button onclick="createRoom()">➕ Create New Room</button>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen">
    <header>
      <div>
        <strong>Room:</strong> <span id="current-room"></span>
        <div id="share-link"></div>
      </div>
      <button onclick="copyLink()" style="width: auto; padding: 8px 12px; font-size: 0.9rem;">📋 Copy Link</button>
    </header>
    <div id="messages"></div>
    <div id="input-area">
      <label for="file-input" class="icon-btn">📎</label>
      <input type="file" id="file-input" accept="image/*,video/*">
      <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
      <button onclick="sendMessage()" style="width: 50px;">➤</button>
    </div>
  </div>

  <!-- Firebase SDKs (Compat version for single-file usage) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

  <script>
   // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyARbaE0wlfhNSwn03aGwUMDjVpkub2ZYts",
  authDomain: "anochat-e5b4b.firebaseapp.com",
  projectId: "anochat-e5b4b",
  storageBucket: "anochat-e5b4b.firebasestorage.app",
  messagingSenderId: "202583620432",
  appId: "1:202583620432:web:84312b13e513a3320c4a55",
  measurementId: "G-TF2B4KZDWQ"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    let roomId = null;
    let username = "User_" + Math.random().toString(36).substr(2, 5);
    const messagesRef = () => db.ref(`rooms/${roomId}/messages`);

    // Check URL for room code
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('room')) {
      document.getElementById('join-code').value = urlParams.get('room');
      joinRoom();
    }

    function createRoom() {
      roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
      enterChat();
    }

    function joinRoom() {
      const code = document.getElementById('join-code').value.trim().toUpperCase();
      if (!code) return alert("Please enter a room code");
      roomId = code;
      enterChat();
    }

    function enterChat() {
      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('chat-screen').style.display = 'flex';
      document.getElementById('current-room').textContent = roomId;
      
      const shareUrl = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
      document.getElementById('share-link').textContent = shareUrl;
      window.history.replaceState(null, '', `?room=${roomId}`);

      // Listen for new messages
      messagesRef().orderByChild('timestamp').on('child_added', snapshot => {
        renderMessage(snapshot.val());
      });

      // File upload handler
      document.getElementById('file-input').addEventListener('change', handleFileUpload);
      
      // Enter key to send
      document.getElementById('msg-input').addEventListener('keypress', e => {
        if (e.key === 'Enter') sendMessage();
      });
    }

    function sendMessage(type = 'text', content = '') {
      const input = document.getElementById('msg-input');
      const text = content || input.value.trim();
      if (!text && type === 'text') return;

      messagesRef().push({
        type,
        content: text,
        sender: username,
        timestamp: firebase.database.ServerValue.TIMESTAMP
      });

      if (type === 'text') input.value = '';
    }

    function handleFileUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      const isVideo = file.type.startsWith('video/');
      const isImage = file.type.startsWith('image/');
      if (!isVideo && !isImage) return alert("Only images & videos allowed");

      const filePath = `${roomId}/${Date.now()}_${file.name}`;
      const uploadTask = storage.ref(filePath).put(file);

      uploadTask.on('state_changed', null, 
        err => alert("Upload failed: " + err.message),
        () => {
          uploadTask.snapshot.ref.getDownloadURL().then(url => {
            sendMessage(isVideo ? 'video' : 'image', url);
            document.getElementById('file-input').value = '';
          });
        }
      );
    }

    function renderMessage(msg) {
      const div = document.createElement('div');
      const isMe = msg.sender === username;
      div.className = `msg ${isMe ? 'me' : 'other'}`;
      
      let contentHtml = '';
      if (msg.type === 'text') contentHtml = `<div>${escapeHtml(msg.content)}</div>`;
      else if (msg.type === 'image') contentHtml = `<img src="${msg.content}" alt="Image">`;
      else if (msg.type === 'video') contentHtml = `<video src="${msg.content}" controls></video>`;

      const time = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      div.innerHTML = `${contentHtml}<div class="meta">${msg.sender} • ${time}</div>`;
      
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function copyLink() {
      navigator.clipboard.writeText(document.getElementById('share-link').textContent);
      alert("Link copied! Share it to let others join.");
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
