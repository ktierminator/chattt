<!DOCTYPE html>
<html>
<head>
  <title>Realtime Chat Room</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
  <style>
    body { font-family: Arial; margin:0; background:#f4f4f4; }
    #chat { height:70vh; overflow-y:auto; padding:10px; background:white; }
    .msg { margin:8px 0; padding:6px; background:#e9e9ff; border-radius:5px; }
    #controls { display:flex; padding:10px; background:#ddd; }
    input, button { padding:8px; margin-right:5px; }
    img, video { max-width:200px; display:block; margin-top:5px; }
  </style>
</head>
<body>

<h2>Realtime Chat Room</h2>

<div>
  Room Code: <input id="roomInput" placeholder="Enter or Create Room Code">
  <button onclick="joinRoom()">Join Room</button>
</div>

<div id="chat"></div>

<div id="controls">
  <input id="messageInput" placeholder="Type message..." style="flex:1;">
  <input type="file" id="fileInput">
  <button onclick="sendMessage()">Send</button>
</div>

<script type="module">

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyARbaE0wlfhNSwn03aGwUMDjVpkub2ZYts",
  authDomain: "anochat-e5b4b.firebaseapp.com",
  projectId: "anochat-e5b4b",
  storageBucket: "anochat-e5b4b.firebasestorage.app",
  messagingSenderId: "202583620432",
  appId: "1:202583620432:web:84312b13e513a3320c4a55",
  measurementId: "G-TF2B4KZDWQ"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);
const auth = getAuth();

signInAnonymously(auth);

let currentRoom = "";

window.joinRoom = function() {
  currentRoom = document.getElementById("roomInput").value;
  if (!currentRoom) return alert("Enter room code!");

  document.getElementById("chat").innerHTML = "";
  const roomRef = ref(db, "rooms/" + currentRoom);

  onChildAdded(roomRef, snapshot => {
    const data = snapshot.val();
    displayMessage(data);
  });

  alert("Room joined! Share this code: " + currentRoom);
}

window.sendMessage = async function() {
  if (!currentRoom) return alert("Join a room first!");

  const text = document.getElementById("messageInput").value;
  const file = document.getElementById("fileInput").files[0];

  let messageData = {
    text: text || "",
    timestamp: Date.now()
  };

  if (file) {
    const storageRef = sRef(storage, "uploads/" + Date.now() + "_" + file.name);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);
    messageData.fileURL = url;
    messageData.fileType = file.type;
  }

  await push(ref(db, "rooms/" + currentRoom), messageData);

  document.getElementById("messageInput").value = "";
  document.getElementById("fileInput").value = "";
}

function displayMessage(data) {
  const div = document.createElement("div");
  div.className = "msg";

  if (data.text) {
    div.innerHTML += "<div>" + data.text + "</div>";
  }

  if (data.fileURL) {
    if (data.fileType.startsWith("image")) {
      div.innerHTML += `<img src="${data.fileURL}">`;
    } else if (data.fileType.startsWith("video")) {
      div.innerHTML += `<video controls src="${data.fileURL}"></video>`;
    } else {
      div.innerHTML += `<a href="${data.fileURL}" target="_blank">Download File</a>`;
    }
  }

  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

</script>

</body>
</html>
